<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Mio Diario To-Do</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; --text: #2d3436; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px 20px; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; margin-bottom: 1.5rem; color: var(--primary); }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex-grow: 1; padding: 12px; border: 2px solid #dfe6e9; border-radius: 8px; outline: none; transition: border-color 0.3s; }
        input[type="text"]:focus { border-color: var(--primary); }
        
        button#add-btn { padding: 10px 18px; background-color: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button#add-btn:hover { opacity: 0.9; }

        ul { list-style: none; padding: 0; }
        li { background: #fff; border: 1px solid #eee; margin-bottom: 8px; padding: 12px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; animation: fadeIn 0.3s ease; }
        
        .todo-content { display: flex; align-items: center; gap: 12px; flex-grow: 1; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .checked { text-decoration: line-through; color: #b2bec3; }
        
        .delete-btn { color: #ff7675; cursor: pointer; font-size: 0.9rem; margin-left: 10px; border: none; background: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2>📓 Diario Attività</h2>
    
    <div class="input-group">
        <input type="text" id="todo-input" placeholder="Cosa devi fare oggi?">
        <button id="add-btn">Aggiungi</button>
    </div>

    <ul id="todo-list"></ul>
</div>

<script>
    const input = document.getElementById('todo-input');
    const addBtn = document.getElementById('add-btn');
    const list = document.getElementById('todo-list');

    // Carica dati salvati al caricamento
    document.addEventListener('DOMContentLoaded', getTodos);

    addBtn.addEventListener('click', addTodo);
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') addTodo(); });

    function addTodo() {
        if (input.value.trim() === "") return;

        const todo = { text: input.value, completed: false };
        createTodoElement(todo);
        saveLocalTodo(todo);
        input.value = "";
    }

    function createTodoElement(todo) {
        const li = document.createElement('li');
        li.innerHTML = `
            <div class="todo-content">
                <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(this)">
                <span class="${todo.completed ? 'checked' : ''}">${todo.text}</span>
            </div>
            <button class="delete-btn" onclick="removeTodo(this)">Elimina</button>
        `;
        list.appendChild(li);
    }

    function toggleTodo(checkbox) {
        const text = checkbox.nextElementSibling;
        text.classList.toggle('checked');
        updateLocalStorage();
    }

    function removeTodo(btn) {
        btn.parentElement.remove();
        updateLocalStorage();
    }

    // Funzioni per la persistenza dati (LocalStorage)
    function saveLocalTodo(todo) {
        let todos = localStorage.getItem('todos') ? JSON.parse(localStorage.getItem('todos')) : [];
        todos.push(todo);
        localStorage.setItem('todos', JSON.stringify(todos));
    }

    function updateLocalStorage() {
        const items = [];
        document.querySelectorAll('li').forEach(li => {
            items.push({
                text: li.querySelector('span').innerText,
                completed: li.querySelector('input').checked
            });
        });
        localStorage.setItem('todos', JSON.stringify(items));
    }

    function getTodos() {
        let todos = localStorage.getItem('todos') ? JSON.parse(localStorage.getItem('todos')) : [];
        todos.forEach(todo => createTodoElement(todo));
    }
</script>

</body>
</html>
